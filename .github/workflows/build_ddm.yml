name: Build DDM Manager

on:
  push:
    branches: [main]
    paths:
      - 'ddm_manager.py'
      - 'ddm_manager.spec'
      - '.github/workflows/build_ddm.yml'
  workflow_dispatch:   # permite rodar manualmente pelo site do GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install pyinstaller python-docx lxml

      - name: Compilar .exe
        run: |
          pyinstaller ddm_manager.spec

      - name: Upload do executável
        uses: actions/upload-artifact@v4
        with:
          name: DDM_Manager_Metalfrio
          path: dist/DDM_Manager_Metalfrio.exe
          retention-days: 30
